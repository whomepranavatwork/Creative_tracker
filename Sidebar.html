<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; font-size: 13px; color: #202124; background: #fff; }

  .section { padding: 12px 14px; border-bottom: 1px solid #e0e0e0; }
  .section:last-child { border-bottom: none; }

  h3 { font-size: 13px; font-weight: 600; color: #1a73e8; margin-bottom: 10px; }

  label { display: block; font-size: 12px; color: #5f6368; margin-bottom: 2px; margin-top: 8px; }
  label:first-of-type { margin-top: 0; }

  input[type=text], input[type=date], select, textarea {
    width: 100%; padding: 6px 8px; border: 1px solid #dadce0;
    border-radius: 4px; font-size: 13px; color: #202124; background: #fff;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: #1a73e8; }
  textarea { resize: vertical; min-height: 52px; }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .folder-row { display: flex; gap: 6px; }
  .folder-row input { flex: 1; }

  button { padding: 7px 14px; border: none; border-radius: 4px; font-size: 13px; cursor: pointer; }
  .btn-primary { background: #1a73e8; color: #fff; }
  .btn-primary:hover { background: #1557b0; }
  .btn-primary:disabled { background: #9aa0a6; cursor: not-allowed; }
  .btn-secondary { background: #f1f3f4; color: #202124; }
  .btn-secondary:hover { background: #e8eaed; }
  .btn-link { background: none; color: #1a73e8; padding: 0; font-size: 12px; text-decoration: underline; cursor: pointer; border: none; white-space: nowrap; }

  #status { padding: 8px 14px; font-size: 12px; }
  .status-ok  { color: #188038; background: #e6f4ea; border-radius: 4px; padding: 8px; }
  .status-err { color: #c5221f; background: #fce8e6; border-radius: 4px; padding: 8px; }
  .status-info { color: #5f6368; }

  /* Cuts table */
  #cuts-section { display: none; }
  .cuts-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
  .cuts-table th {
    background: #f1f3f4; font-size: 11px; font-weight: 600;
    padding: 5px 6px; text-align: left; border: 1px solid #e0e0e0;
  }
  .cuts-table td { padding: 4px; border: 1px solid #e0e0e0; vertical-align: middle; }
  .cuts-table td.fname {
    font-size: 11px; color: #5f6368; max-width: 80px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .cuts-table td.chk { width: 24px; text-align: center; }
  .cuts-table select { padding: 3px 4px; font-size: 12px; }

  /* File list for same-for-all */
  .file-list { margin-top: 6px; max-height: 130px; overflow-y: auto; border: 1px solid #e0e0e0; border-radius: 4px; }
  .file-list label {
    display: flex; align-items: center; gap: 6px; padding: 4px 8px;
    margin: 0; font-size: 12px; color: #202124;
    border-bottom: 1px solid #f0f0f0; cursor: pointer;
  }
  .file-list label:last-child { border-bottom: none; }
  .file-list label:hover { background: #f8f9fa; }
  .file-list input[type=checkbox] { width: auto; flex-shrink: 0; }
  .file-list span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .footer { padding: 12px 14px; display: flex; gap: 8px; align-items: center; }
  .sheet-info { font-size: 11px; color: #9aa0a6; padding: 4px 0 0; }
</style>
</head>
<body>

<!-- Tab selector -->
<div class="section" style="background:#f8f9fa;">
  <h3>Sheet Tab</h3>
  <select id="tab-name" onchange="onTabChange()" style="width:100%;font-weight:600;">
    <option value="">Loading tabs…</option>
  </select>
  <div class="sheet-info" id="sheet-info"></div>
</div>

<!-- Step 1: Folder -->
<div class="section">
  <h3>Step 1 — Drive Folder</h3>
  <label>Paste the Google Drive folder link</label>
  <div class="folder-row">
    <input type="text" id="folder-url" placeholder="https://drive.google.com/drive/folders/…">
    <button class="btn-secondary" id="load-btn" onclick="loadFolder()" disabled>Load</button>
  </div>
  <div id="folder-status" class="status-info" style="margin-top:6px;font-size:12px;"></div>
</div>

<!-- Step 2: Shared fields -->
<div class="section">
  <h3>Step 2 — Shared Fields</h3>

  <div class="row2">
    <div>
      <label>Product Name</label>
      <input type="text" id="product" placeholder="e.g. Advance Regime">
    </div>
    <div>
      <label>Date Added</label>
      <input type="date" id="date">
    </div>
  </div>

  <div class="row2">
    <div>
      <label>INT / INF</label>
      <select id="intInf"></select>
    </div>
    <div>
      <label>Ad Type</label>
      <select id="adType"></select>
    </div>
  </div>

  <label>Language</label>
  <select id="language"></select>

  <label>Person Full Name</label>
  <input type="text" id="person" placeholder="e.g. Bhuvan Mehta  (leave blank for None)">

  <div class="row2">
    <div>
      <label>Creator Type</label>
      <select id="creatorType"></select>
    </div>
    <div>
      <label>Onboarding Month</label>
      <select id="onboardingMonth"></select>
    </div>
  </div>

  <label>Instagram Profile</label>
  <input type="text" id="instagram" placeholder="https://www.instagram.com/…">

  <div class="row2">
    <div>
      <label>Live?</label>
      <select id="live"></select>
    </div>
    <div>
      <label>Can take live?</label>
      <select id="canLive"></select>
    </div>
  </div>

  <div class="row2">
    <div>
      <label>Raised By</label>
      <input type="text" id="raisedBy" value="Pranav">
    </div>
    <div>
      <label>Additional Info</label>
      <input type="text" id="additionalInfo" placeholder="Optional">
    </div>
  </div>
</div>

<!-- Step 3: Per-cut fields -->
<div class="section" id="cuts-section">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
    <h3 style="margin:0;">Step 3 — Per Cut (<span id="cut-count">0</span> files)</h3>
    <label style="display:flex;align-items:center;gap:5px;margin:0;font-size:12px;color:#5f6368;cursor:pointer;">
      <input type="checkbox" id="same-for-all" checked onchange="onSameForAllToggle()">
      Same for all
    </label>
  </div>

  <!-- Shown when "Same for all" is ON -->
  <div id="all-same-panel">
    <div class="row2">
      <div>
        <label>Funnel</label>
        <select id="all_funnel"></select>
      </div>
      <div>
        <label>Ratio</label>
        <div id="all_ratio_wrap"></div>
      </div>
    </div>
    <div class="row2">
      <div>
        <label>Narrative</label>
        <div id="all_narrative_wrap"></div>
      </div>
      <div>
        <label>Ad Format</label>
        <div id="all_adFormat_wrap"></div>
      </div>
    </div>
    <label style="margin-top:10px;">Files to include</label>
    <div class="file-list" id="sfa-file-list">
      <div style="padding:8px;font-size:12px;color:#9aa0a6;">Load a folder first.</div>
    </div>
  </div>

  <!-- Shown when "Same for all" is OFF -->
  <div id="per-cut-panel" style="display:none;">
    <div style="overflow-x:auto;">
      <table class="cuts-table" id="cuts-table">
        <thead>
          <tr>
            <th class="chk">✓</th>
            <th>File</th>
            <th>Funnel</th>
            <th>Narrative</th>
            <th>Format</th>
            <th>Ratio</th>
          </tr>
        </thead>
        <tbody id="cuts-body"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Footer -->
<div class="footer">
  <button class="btn-primary" id="submit-btn" onclick="submitEntries()" disabled>
    Add to Sheet
  </button>
  <span id="submit-status" style="font-size:12px;color:#5f6368;"></span>
</div>

<div id="status"></div>

<script>
  let opts = {};
  let files = [];
  let sheetCtx = {};

  const LS_KEYS = ["product","intInf","adType","language","person","creatorType","instagram","raisedBy"];

  // ── Init ──────────────────────────────────────────────────
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("date").value = new Date().toISOString().split("T")[0];

    google.script.run
      .withSuccessHandler(data => {
        opts = data.dropdownOptions;
        populateDropdowns();
        restoreFromStorage();

        const sel = document.getElementById("tab-name");
        sel.innerHTML = "";
        data.sheetNames.forEach(name => {
          const opt = document.createElement("option");
          opt.value = name; opt.textContent = name;
          sel.appendChild(opt);
        });
        document.getElementById("load-btn").disabled = false;
        onTabChange();
      })
      .withFailureHandler(err => showStatus("Failed to load: " + err.message, false))
      .init();
  });

  function onTabChange() {
    if (files.length > 0) resetBatch();

    const tabName = document.getElementById("tab-name").value;
    document.getElementById("sheet-info").textContent = "Loading…";
    google.script.run
      .withSuccessHandler(ctx => {
        sheetCtx = ctx;
        document.getElementById("sheet-info").textContent =
          `${ctx.totalRows} existing rows · Next S.No.: ${ctx.nextSno}`;
      })
      .withFailureHandler(() => {
        document.getElementById("sheet-info").textContent = "⚠ No tracker headers found on this tab.";
      })
      .getSheetContext(tabName);
  }

  function populateDropdowns() {
    fill("intInf",          opts.intInf);
    fill("adType",          opts.adType);
    fill("language",        opts.language);
    fill("creatorType",     opts.creatorType);
    fill("onboardingMonth", opts.onboardingMonth);
    fill("live",            opts.live);
    fill("canLive",         opts.canLive);
    fill("all_funnel",      opts.funnel);

    // Build "same for all" selects — available before any folder is loaded
    buildSelectInDiv("all_ratio_wrap",     "all_ratio",     opts.ratio,     false);
    buildSelectInDiv("all_narrative_wrap", "all_narrative", opts.narrative, true);
    buildSelectInDiv("all_adFormat_wrap",  "all_adFormat",  opts.adFormat,  true);
  }

  function fill(id, values) {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = "";
    values.forEach(v => {
      const opt = document.createElement("option");
      opt.value = v; opt.textContent = v || "—";
      el.appendChild(opt);
    });
  }

  function buildSelectInDiv(wrapId, selId, values, allowCustom, defaultVal) {
    const wrap = document.getElementById(wrapId);
    if (!wrap) return;
    wrap.innerHTML = "";
    wrap.appendChild(makeSelectField(selId, values, allowCustom, defaultVal));
  }

  // ── Load folder ───────────────────────────────────────────
  function loadFolder() {
    const url = document.getElementById("folder-url").value.trim();
    if (!url) { setFolderStatus("Paste a Drive folder link first.", false); return; }

    setFolderStatus("Loading files…", null);
    document.getElementById("submit-btn").disabled = true;

    google.script.run
      .withSuccessHandler(result => {
        if (!result.ok) { setFolderStatus(result.msg, false); return; }
        files = result.files;
        setFolderStatus(`Found ${files.length} file${files.length !== 1 ? "s" : ""}.`, true);
        document.getElementById("cut-count").textContent = files.length;
        document.getElementById("cuts-section").style.display = "block";
        buildCutsTable();
        buildSfaFileList();
        document.getElementById("submit-btn").disabled = false;
      })
      .withFailureHandler(err => setFolderStatus("Error: " + err.message, false))
      .getFolderFiles(url);
  }

  function setFolderStatus(msg, ok) {
    const el = document.getElementById("folder-status");
    el.textContent = msg;
    el.className = ok === true ? "status-ok" : ok === false ? "status-err" : "status-info";
  }

  function onSameForAllToggle() {
    const on = document.getElementById("same-for-all").checked;
    document.getElementById("all-same-panel").style.display = on ? "" : "none";
    document.getElementById("per-cut-panel").style.display  = on ? "none" : "";
  }

  // ── Build per-cut table ───────────────────────────────────
  function buildCutsTable() {
    const tbody = document.getElementById("cuts-body");
    tbody.innerHTML = "";
    const defaultRatio = document.getElementById("all_ratio")?.value || opts.ratio[0];

    files.forEach((f, i) => {
      const tr = document.createElement("tr");

      const tdChk = document.createElement("td");
      tdChk.className = "chk";
      const chk = document.createElement("input");
      chk.type = "checkbox"; chk.id = "pct_include_" + i; chk.checked = true;
      chk.style.cssText = "width:auto;";
      tdChk.appendChild(chk);
      tr.appendChild(tdChk);

      const tdName = document.createElement("td");
      tdName.className = "fname";
      tdName.title = f.name;
      tdName.textContent = f.name;
      tr.appendChild(tdName);

      tr.appendChild(makeSelectCell("funnel_"    + i, opts.funnel));
      tr.appendChild(makeSelectCell("narrative_" + i, opts.narrative, true));
      tr.appendChild(makeSelectCell("adFormat_"  + i, opts.adFormat,  true));
      tr.appendChild(makeSelectCell("ratio_"     + i, opts.ratio, false, defaultRatio));

      tbody.appendChild(tr);
    });
  }

  // File checklist for "same for all" mode
  function buildSfaFileList() {
    const list = document.getElementById("sfa-file-list");
    list.innerHTML = "";
    files.forEach((f, i) => {
      const lbl = document.createElement("label");
      const chk = document.createElement("input");
      chk.type = "checkbox"; chk.id = "sfa_include_" + i; chk.checked = true;
      const span = document.createElement("span");
      span.textContent = f.name;
      span.title = f.name;
      lbl.appendChild(chk);
      lbl.appendChild(span);
      list.appendChild(lbl);
    });
  }

  // Returns a <div> with a select (+ optional custom input)
  function makeSelectField(id, values, allowCustom, defaultVal) {
    const wrap = document.createElement("div");
    const sel  = document.createElement("select");
    sel.id = id;

    values.forEach(v => {
      const opt = document.createElement("option");
      opt.value = v; opt.textContent = v || "—";
      if (defaultVal && v === defaultVal) opt.selected = true;
      sel.appendChild(opt);
    });

    const inp = document.createElement("input");
    inp.type = "text";
    inp.id = id + "_custom";
    inp.placeholder = "Type and press Enter";
    inp.style.cssText = "display:none;font-size:12px;padding:3px 4px;width:100%;";

    if (allowCustom) {
      const customOpt = document.createElement("option");
      customOpt.value = "__custom__"; customOpt.textContent = "Other…";
      sel.appendChild(customOpt);

      sel.addEventListener("change", () => {
        if (sel.value === "__custom__") {
          sel.style.display = "none";
          inp.style.display = "";
          inp.focus();
        }
      });

      const confirmCustom = () => {
        const val = inp.value.trim();
        if (val) {
          const newOpt = document.createElement("option");
          newOpt.value = val; newOpt.textContent = val;
          sel.insertBefore(newOpt, customOpt);
          sel.value = val;
        } else {
          sel.value = values[0];
        }
        inp.style.display = "none";
        sel.style.display = "";
      };
      inp.addEventListener("keydown", e => { if (e.key === "Enter") confirmCustom(); });
      inp.addEventListener("blur", confirmCustom);
    }

    wrap.appendChild(sel);
    wrap.appendChild(inp);
    return wrap;
  }

  // Returns a <td> wrapping a select field (for the per-cut table)
  function makeSelectCell(id, values, allowCustom, defaultVal) {
    const td = document.createElement("td");
    td.appendChild(makeSelectField(id, values, allowCustom, defaultVal));
    return td;
  }

  function getCutFieldValue(id) {
    const inp = document.getElementById(id + "_custom");
    if (inp && inp.style.display !== "none") return inp.value.trim();
    const sel = document.getElementById(id);
    return sel ? sel.value : "";
  }

  // ── LocalStorage ──────────────────────────────────────────
  function saveToStorage() {
    LS_KEYS.forEach(key => {
      const el = document.getElementById(key);
      if (el) localStorage.setItem("ct_" + key, el.value);
    });
  }

  function restoreFromStorage() {
    LS_KEYS.forEach(key => {
      const val = localStorage.getItem("ct_" + key);
      if (val === null) return;
      const el = document.getElementById(key);
      if (el) el.value = val;
    });
  }

  // ── Reset batch ───────────────────────────────────────────
  function resetBatch() {
    files = [];
    document.getElementById("folder-url").value       = "";
    document.getElementById("folder-status").textContent = "";
    document.getElementById("folder-status").className   = "status-info";
    document.getElementById("cuts-section").style.display = "none";
    document.getElementById("cuts-body").innerHTML        = "";
    document.getElementById("sfa-file-list").innerHTML    =
      '<div style="padding:8px;font-size:12px;color:#9aa0a6;">Load a folder first.</div>';
    document.getElementById("cut-count").textContent = "0";
    document.getElementById("submit-btn").disabled   = true;
    document.getElementById("status").innerHTML      = "";
  }

  // ── Submit ────────────────────────────────────────────────
  function submitEntries() {
    if (files.length === 0) { showStatus("Load a Drive folder first (Step 1).", false); return; }

    const shared = {
      product:         document.getElementById("product").value.trim(),
      date:            formatDateForSheet(document.getElementById("date").value),
      intInf:          document.getElementById("intInf").value,
      adType:          document.getElementById("adType").value,
      language:        document.getElementById("language").value,
      person:          document.getElementById("person").value.trim(),
      creatorType:     document.getElementById("creatorType").value,
      onboardingMonth: document.getElementById("onboardingMonth").value,
      instagram:       document.getElementById("instagram").value.trim(),
      live:            document.getElementById("live").value,
      canLive:         document.getElementById("canLive").value,
      raisedBy:        document.getElementById("raisedBy").value.trim(),
      additionalInfo:  document.getElementById("additionalInfo").value.trim()
    };

    if (!shared.product) { showStatus("Please fill in Product Name.", false); return; }

    const sameForAll = document.getElementById("same-for-all").checked;
    const cuts = [];
    files.forEach((f, i) => {
      const included = sameForAll
        ? (document.getElementById("sfa_include_" + i)?.checked !== false)
        : (document.getElementById("pct_include_" + i)?.checked !== false);
      if (!included) return;
      cuts.push({
        url:       f.url,
        fileName:  f.name,
        funnel:    sameForAll ? document.getElementById("all_funnel").value : document.getElementById("funnel_" + i).value,
        narrative: sameForAll ? getCutFieldValue("all_narrative")           : getCutFieldValue("narrative_" + i),
        adFormat:  sameForAll ? getCutFieldValue("all_adFormat")            : getCutFieldValue("adFormat_" + i),
        ratio:     sameForAll ? getCutFieldValue("all_ratio")               : getCutFieldValue("ratio_" + i)
      });
    });

    if (cuts.length === 0) { showStatus("No files selected to add.", false); return; }

    document.getElementById("submit-btn").disabled = true;
    document.getElementById("submit-status").textContent = "Writing to sheet…";

    google.script.run
      .withSuccessHandler(result => {
        document.getElementById("submit-btn").disabled = false;
        document.getElementById("submit-status").textContent = "";
        if (result.ok) {
          saveToStorage();
          sheetCtx.nextSno     = result.nextSno;
          sheetCtx.lastDataRow = result.lastDataRow;
          sheetCtx.totalRows   = result.totalRows;
          document.getElementById("sheet-info").textContent =
            `${result.totalRows} existing rows · Next S.No.: ${result.nextSno}`;
          showStatusWithReset(result.msg);
        } else {
          showStatus(result.msg, false);
        }
      })
      .withFailureHandler(err => {
        document.getElementById("submit-btn").disabled = false;
        document.getElementById("submit-status").textContent = "";
        showStatus("Error: " + err.message, false);
      })
      .addEntries({
        tabName:          document.getElementById("tab-name").value,
        colIndex:         sheetCtx.colIndex,
        headerRow:        sheetCtx.headerRow,
        lastDataRow:      sheetCtx.lastDataRow,
        nextSno:          sheetCtx.nextSno,
        totalRows:        sheetCtx.totalRows,
        adNameFormula:    sheetCtx.adNameFormula,
        adNameFormulaRow: sheetCtx.adNameFormulaRow,
        shared,
        cuts
      });
  }

  function showStatus(msg, ok) {
    const el  = document.getElementById("status");
    const div = document.createElement("div");
    div.className = ok ? "status-ok" : "status-err";
    div.style.cssText = "margin:8px 14px;";
    div.textContent = msg;
    el.innerHTML = "";
    el.appendChild(div);
  }

  function showStatusWithReset(msg) {
    const el  = document.getElementById("status");
    const div = document.createElement("div");
    div.className = "status-ok";
    div.style.cssText = "margin:8px 14px;display:flex;justify-content:space-between;align-items:center;gap:8px;";
    const txt = document.createElement("span");
    txt.textContent = msg;
    const btn = document.createElement("button");
    btn.className = "btn-link";
    btn.textContent = "New batch";
    btn.onclick = resetBatch;
    div.appendChild(txt);
    div.appendChild(btn);
    el.innerHTML = "";
    el.appendChild(div);
  }

  function formatDateForSheet(isoDate) {
    if (!isoDate) return "";
    const [y, m, d] = isoDate.split("-");
    return `${d}/${m}/${y}`;
  }
</script>
</body>
</html>
